name: Security checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # CodeQL scanning is handled by GitHub's Default Setup (Settings > Code security >
  # Code scanning) instead of a workflow-defined job here — GitHub rejects results
  # from an advanced/workflow CodeQL config while Default Setup is enabled for the
  # repo, and this job added no custom queries beyond what Default Setup already runs.
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  python-sast:
    name: Python SAST & dependency audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scanners
        run: pip install bandit pip-audit

      - name: Run bandit
        run: |
          if git ls-files '*.py' | grep -q .; then
            bandit -r . -x ./.venv,./venv,./tests -ll
          else
            echo "No Python source files yet, skipping bandit."
          fi

      - name: Run pip-audit
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt
          elif [ -f pyproject.toml ]; then
            pip-audit
          else
            echo "No dependency manifest yet, skipping pip-audit."
          fi
